<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Amex Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e4dc;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
input,select,button{font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;
const { PieChart, Pie, Cell, Tooltip, ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid } = Recharts;

const CATEGORY_MAP = {
  "restaurant|dining|cafe|coffee|starbucks|mcdonald|chipotle|pizza|sushi|burger|taco|sweetgreen|momofuku|noodle": "Dining",
  "uber|lyft|taxi|mta|metro|transit|parking|gas|fuel|shell|bp |exxon|chevron|delta|united|american air|hotel|marriott|hilton|airbnb": "Travel",
  "amazon|walmart|target|costco|whole foods|trader joe|kroger|safeway|market|grocery|wholefoods": "Shopping",
  "netflix|spotify|hulu|disney|apple|youtube|prime|moma|museum": "Entertainment",
  "cvs|walgreen|pharmacy|medical|doctor|dental|health|equinox|gym": "Health",
  "electric|water|internet|at&t|verizon|comcast|con ed|utility": "Utilities",
};
function autoCategory(desc) {
  const d = desc.toLowerCase();
  for (const [pattern, cat] of Object.entries(CATEGORY_MAP)) {
    if (pattern.split("|").some(p => d.includes(p.trim()))) return cat;
  }
  return "Other";
}
const CAT_COLORS = { Dining:"#e8845a", Travel:"#4fc4a8", Shopping:"#e86e8a", Entertainment:"#a87fd4", Health:"#6bbf72", Utilities:"#5bbfbf", Other:"#888" };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function parseAmexCSV(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const start = lines[0].toLowerCase().includes("date") ? 1 : 0;
  return lines.slice(start).map((line, i) => {
    const cols = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; continue; }
      cur += ch;
    }
    cols.push(cur.trim());
    const rawDate = cols[0] || "";
    const desc = cols[1] || "Unknown";
    const rawAmt = cols[2] || "0";
    const amount = parseFloat(rawAmt.replace(/[^0-9.\-]/g, "")) || 0;
    let date = rawDate;
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(rawDate)) {
      const [m, d, y] = rawDate.split("/");
      date = `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
    }
    const category = cols[10] ? autoCategory(cols[10]) : autoCategory(desc);
    return { id: `${date}-${i}`, date, desc, amount: Math.abs(amount), category };
  }).filter(t => t.date && t.amount > 0);
}

const SAMPLE_CSV = `Date,Description,Amount,,,,,,,,,Category
05/01/2026,WHOLE FOODS MARKET,87.43,,,,,,,,,Supermarkets
05/01/2026,STARBUCKS #4521,6.75,,,,,,,,,Restaurants
05/02/2026,NETFLIX.COM,15.99,,,,,,,,,Entertainment
05/02/2026,SHELL OIL,54.20,,,,,,,,,Gas Stations
05/03/2026,UBER *TRIP,12.40,,,,,,,,,Transportation
05/04/2026,CHIPOTLE MEXICAN GRILL,14.85,,,,,,,,,Restaurants
05/04/2026,AMAZON.COM,67.32,,,,,,,,,Shopping
05/05/2026,CVS PHARMACY,23.18,,,,,,,,,Drug Stores
05/06/2026,DELTA AIR LINES,342.00,,,,,,,,,Airlines
05/07/2026,SWEETGREEN,16.50,,,,,,,,,Restaurants
05/08/2026,CON EDISON,94.20,,,,,,,,,Utilities
05/08/2026,SPOTIFY USA,9.99,,,,,,,,,Entertainment
05/09/2026,TRADER JOE'S,61.77,,,,,,,,,Supermarkets
05/10/2026,UBER *TRIP,18.90,,,,,,,,,Transportation
05/10/2026,SUSHI RESTAURANT,88.00,,,,,,,,,Restaurants
05/11/2026,TARGET,43.56,,,,,,,,,Shopping
05/12/2026,EQUINOX,85.00,,,,,,,,,Health
05/13/2026,APPLE.COM/BILL,2.99,,,,,,,,,Entertainment
05/14/2026,WHOLE FOODS,92.10,,,,,,,,,Supermarkets
05/15/2026,LYFT *RIDE,9.75,,,,,,,,,Transportation
05/15/2026,MOMOFUKU NOODLE BAR,54.20,,,,,,,,,Restaurants
05/16/2026,VERIZON WIRELESS,78.00,,,,,,,,,Utilities
05/17/2026,AMAZON.COM,31.99,,,,,,,,,Shopping
05/18/2026,HULU,17.99,,,,,,,,,Entertainment
05/19/2026,BLUE BOTTLE COFFEE,8.50,,,,,,,,,Restaurants
05/20/2026,DUANE READE,19.40,,,,,,,,,Drug Stores
05/20/2026,MOMA MEMBERSHIP,120.00,,,,,,,,,Entertainment`;

function fmt(n) { return "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtS(n) { return n>=1000?"$"+(n/1000).toFixed(1)+"k":fmt(n); }
function isoDate(y,m,d) { return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }

function App() {
  const [txs, setTxs] = useState(() => parseAmexCSV(SAMPLE_CSV));
  const [view, setView] = useState("month");
  const today = useMemo(() => new Date(), []);
  const [curYear, setCurYear] = useState(today.getFullYear());
  const [curMonth, setCurMonth] = useState(today.getMonth());
  const [selDay, setSelDay] = useState(null);
  const [selWeek, setSelWeek] = useState(null);
  const [dragging, setDragging] = useState(false);
  const [aiText, setAiText] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const fileRef = useRef(null);

  const handleFile = useCallback(file => {
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      const parsed = parseAmexCSV(e.target.result);
      if (parsed.length > 0) {
        setTxs(parsed);
        const d = new Date(parsed[0].date + "T12:00:00");
        setCurYear(d.getFullYear()); setCurMonth(d.getMonth());
      }
    };
    r.readAsText(file);
  }, []);

  const monthKey = `${curYear}-${String(curMonth+1).padStart(2,"0")}`;
  const monthTxs = useMemo(() => txs.filter(t => t.date.startsWith(monthKey)), [txs, monthKey]);
  const totalMonth = useMemo(() => monthTxs.reduce((s,t)=>s+t.amount,0), [monthTxs]);
  const byDay = useMemo(() => { const m={}; monthTxs.forEach(t=>{ if(!m[t.date])m[t.date]=[]; m[t.date].push(t); }); return m; }, [monthTxs]);
  const byCategory = useMemo(() => { const m={}; monthTxs.forEach(t=>{m[t.category]=(m[t.category]||0)+t.amount;}); return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value); }, [monthTxs]);
  const maxDay = useMemo(() => Math.max(...Object.values(byDay).map(a=>a.reduce((s,t)=>s+t.amount,0)),1), [byDay]);

  const calDays = useMemo(() => {
    const first = new Date(curYear, curMonth, 1).getDay();
    const dim = new Date(curYear, curMonth+1, 0).getDate();
    const cells = [];
    for(let i=0;i<first;i++) cells.push(null);
    for(let d=1;d<=dim;d++) cells.push(d);
    return cells;
  }, [curYear, curMonth]);

  const weekDays = useMemo(() => {
    const base = selWeek ? new Date(selWeek+"T12:00:00") : (() => { const d=new Date(); d.setDate(d.getDate()-d.getDay()); return d; })();
    return Array.from({length:7},(_,i)=>{ const d=new Date(base); d.setDate(base.getDate()+i); return d.toISOString().split("T")[0]; });
  }, [selWeek]);
  const weekTxs = useMemo(() => txs.filter(t=>weekDays.includes(t.date)), [txs, weekDays]);
  const weekTotal = useMemo(() => weekTxs.reduce((s,t)=>s+t.amount,0), [weekTxs]);
  const dayTxs = useMemo(() => selDay ? (byDay[selDay]||[]) : [], [selDay, byDay]);

  const isToday = d => d === `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const getInsight = async () => {
    setAiLoading(true); setAiText("");
    const summary = byCategory.map(c=>`${c.name}: ${fmt(c.value)}`).join(", ");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300,
          messages:[{role:"user",content:`I spent ${fmt(totalMonth)} in ${MONTHS[curMonth]} ${curYear}. Breakdown: ${summary}. Give me 3 short practical insights about my spending. Be direct and conversational, no bullet symbols, just plain sentences separated by newlines.`}]})
      });
      const data = await res.json();
      setAiText(data.content?.[0]?.text || "No insight returned.");
    } catch { setAiText("Couldn't load insight. Try again."); }
    setAiLoading(false);
  };

  const navBtn = (label, v) => (
    <button onClick={()=>setView(v)} style={{flex:1,padding:"9px 0",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontFamily:"inherit",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,background:view===v?"#e8e4dc":"transparent",color:view===v?"#0f0f13":"#555",transition:"all 0.15s"}}>{label}</button>
  );

  return (
    <div style={{minHeight:"100vh",background:"#0f0f13",color:"#e8e4dc"}}>
      {/* Header */}
      <div style={{background:"#111116",borderBottom:"1px solid #1e1e28",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.03em",color:"#f0ece4"}}>Amex Tracker</div>
          <div style={{fontSize:11,color:"#444",fontFamily:"monospace"}}>{txs.length} transactions</div>
        </div>
        <div style={{display:"flex",gap:4,background:"#1a1a22",borderRadius:10,padding:4}}>
          {navBtn("Month","month")}{navBtn("Week","week")}{navBtn("Day","day")}
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px 60px"}}>

        {/* Upload */}
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)}
          onDrop={e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0]);}}
          onClick={()=>fileRef.current?.click()}
          style={{border:`2px dashed ${dragging?"#a78bfa":"#2a2a36"}`,borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",marginBottom:20,transition:"all 0.2s",background:dragging?"#16161e":"transparent"}}>
          <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])} />
          <div style={{fontSize:24,marginBottom:6}}>📄</div>
          <div style={{fontWeight:600,fontSize:14,color:"#ccc"}}>Drop your Amex CSV here or click to upload</div>
          <div style={{fontSize:12,color:"#444",marginTop:4}}>Sample data loaded · Amex.com → Statements → Export → CSV</div>
        </div>

        {/* Stats */}
        {view==="month" && (
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
            {[["Total Spent",fmtS(totalMonth),"#e8845a"],["Transactions",monthTxs.length,"#5b8fda"],["Daily Avg",fmtS(totalMonth/new Date(curYear,curMonth+1,0).getDate()),"#4fc4a8"]].map(([l,v,c])=>(
              <div key={l} style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:6}}>{l}</div>
                <div style={{fontSize:22,fontWeight:700,color:c,letterSpacing:"-0.02em"}}>{v}</div>
              </div>
            ))}
          </div>
        )}

        {/* MONTH VIEW */}
        {view==="month" && (
          <>
            <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <button onClick={()=>curMonth===0?(setCurMonth(11),setCurYear(y=>y-1)):setCurMonth(m=>m-1)} style={{background:"none",border:"1px solid #2a2a36",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#888"}}>‹</button>
                <div style={{fontSize:22,fontWeight:700,letterSpacing:"-0.03em"}}>{MONTHS[curMonth]} {curYear}</div>
                <button onClick={()=>curMonth===11?(setCurMonth(0),setCurYear(y=>y+1)):setCurMonth(m=>m+1)} style={{background:"none",border:"1px solid #2a2a36",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#888"}}>›</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:8}}>
                {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:"#444",fontFamily:"monospace",letterSpacing:"0.1em",paddingBottom:6}}>{d}</div>)}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
                {calDays.map((day,i)=>{
                  if(!day) return <div key={`e${i}`}/>;
                  const ds = isoDate(curYear,curMonth,day);
                  const dtxs = byDay[ds]||[];
                  const amt = dtxs.reduce((s,t)=>s+t.amount,0);
                  const isT = isToday(ds);
                  return (
                    <div key={day} onClick={()=>{if(dtxs.length){setSelDay(ds);setView("day");}}}
                      style={{borderRadius:8,padding:"8px 6px",minHeight:68,background:isT?"#1a1a2e":amt>0?`rgba(232,132,90,${0.06+0.2*(amt/maxDay)})`:"#111116",border:isT?"1px solid #4a4a8a":"1px solid #1e1e28",cursor:dtxs.length?"pointer":"default",transition:"all 0.15s",position:"relative"}}>
                      <div style={{fontSize:12,fontWeight:700,color:isT?"#a78bfa":"#aaa",fontFamily:"monospace"}}>{day}</div>
                      {amt>0 && <div style={{fontSize:10,color:isT?"#e8845a":"#666",marginTop:3,fontFamily:"monospace"}}>{fmtS(amt)}</div>}
                      <div style={{display:"flex",flexWrap:"wrap",gap:2,marginTop:4}}>
                        {[...new Set(dtxs.map(t=>t.category))].slice(0,3).map(cat=>(
                          <div key={cat} style={{width:5,height:5,borderRadius:1,background:CAT_COLORS[cat]||"#888"}}/>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {byCategory.length>0 && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px"}}>
                  <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:16}}>By Category</div>
                  {byCategory.map(c=>(
                    <div key={c.name} style={{marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#ccc",display:"flex",alignItems:"center",gap:6}}>
                          <span style={{width:8,height:8,borderRadius:2,background:CAT_COLORS[c.name]||"#888",display:"inline-block"}}/>
                          {c.name}
                        </span>
                        <span style={{fontSize:13,fontFamily:"monospace",fontWeight:600,color:"#e8e4dc"}}>{fmt(c.value)}</span>
                      </div>
                      <div style={{height:3,borderRadius:2,background:"#1e1e28"}}>
                        <div style={{height:"100%",borderRadius:2,background:CAT_COLORS[c.name]||"#888",width:`${(c.value/totalMonth)*100}%`,transition:"width 0.5s"}}/>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px"}}>
                  <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:16}}>Spending Split</div>
                  <ResponsiveContainer width="100%" height={180}>
                    <PieChart>
                      <Pie data={byCategory} cx="50%" cy="50%" innerRadius={50} outerRadius={78} dataKey="value" strokeWidth={0}>
                        {byCategory.map(c=><Cell key={c.name} fill={CAT_COLORS[c.name]||"#888"}/>)}
                      </Pie>
                      <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1a1a22",border:"1px solid #2a2a36",borderRadius:8,fontSize:12,fontFamily:"monospace"}}/>
                    </PieChart>
                  </ResponsiveContainer>
                </div>
              </div>
            )}

            <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase"}}>AI Insight</div>
                <button onClick={getInsight} disabled={aiLoading} style={{background:"#1e1e2e",border:"1px solid #2a2a3e",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:12,color:"#a78bfa",fontFamily:"monospace",fontWeight:600}}>
                  {aiLoading?"Analyzing...":"✦ Analyze spending"}
                </button>
              </div>
              {aiText ? <div style={{color:"#ccc",fontSize:14,lineHeight:1.8,fontStyle:"italic",whiteSpace:"pre-line"}}>{aiText}</div>
                : <div style={{color:"#333",fontSize:13}}>Click to get personalized insights about this month.</div>}
            </div>
          </>
        )}

        {/* WEEK VIEW */}
        {view==="week" && (
          <>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}>
              {[["Week Total",fmtS(weekTotal),"#e8845a"],["Charges",weekTxs.length,"#5b8fda"],["Daily Avg",fmtS(weekTotal/7),"#4fc4a8"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:12,padding:"14px 16px"}}>
                  <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:6}}>{l}</div>
                  <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                <button onClick={()=>{const d=new Date((selWeek||weekDays[0])+"T12:00:00");d.setDate(d.getDate()-7);setSelWeek(d.toISOString().split("T")[0]);}} style={{background:"none",border:"1px solid #2a2a36",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#888"}}>‹</button>
                <div style={{fontSize:16,fontWeight:700}}>
                  {new Date(weekDays[0]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})} – {new Date(weekDays[6]+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
                </div>
                <button onClick={()=>{const d=new Date((selWeek||weekDays[0])+"T12:00:00");d.setDate(d.getDate()+7);setSelWeek(d.toISOString().split("T")[0]);}} style={{background:"none",border:"1px solid #2a2a36",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:16,color:"#888"}}>›</button>
              </div>
              <ResponsiveContainer width="100%" height={140}>
                <BarChart data={weekDays.map(ds=>({day:DAYS[new Date(ds+"T12:00:00").getDay()],amount:(byDay[ds]||[]).reduce((s,t)=>s+t.amount,0),ds}))}
                  onClick={d=>{if(d?.activePayload?.[0]?.payload?.amount>0){setSelDay(d.activePayload[0].payload.ds);setView("day");}}}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e1e28" vertical={false}/>
                  <XAxis dataKey="day" tick={{fontSize:11,fontFamily:"monospace",fill:"#666"}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fontSize:10,fontFamily:"monospace",fill:"#444"}} axisLine={false} tickLine={false} tickFormatter={v=>v?"$"+v:""}/>
                  <Tooltip formatter={v=>fmt(v)} contentStyle={{background:"#1a1a22",border:"1px solid #2a2a36",borderRadius:8,fontSize:12}}/>
                  <Bar dataKey="amount" fill="#e8845a" radius={[4,4,0,0]} cursor="pointer"/>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px"}}>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:16}}>Charges This Week</div>
              {weekTxs.length===0 && <div style={{color:"#333",fontSize:13}}>No charges this week.</div>}
              {weekTxs.map(t=>(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1a1a22"}}>
                  <div>
                    <div style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{width:8,height:8,borderRadius:2,background:CAT_COLORS[t.category]||"#888",display:"inline-block",flexShrink:0}}/>
                      {t.desc}
                    </div>
                    <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginTop:2}}>{t.date} · {t.category}</div>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,fontFamily:"monospace",color:"#e8845a"}}>{fmt(t.amount)}</div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* DAY VIEW */}
        {view==="day" && (
          <>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
              <button onClick={()=>setView("month")} style={{background:"none",border:"1px solid #2a2a36",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,color:"#888"}}>← Month</button>
              <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.02em"}}>
                {selDay ? new Date(selDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}) : "Select a day"}
              </div>
            </div>
            {selDay ? (
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {[["Total",fmt(dayTxs.reduce((s,t)=>s+t.amount,0)),"#e8845a"],["Charges",dayTxs.length,"#5b8fda"]].map(([l,v,c])=>(
                    <div key={l} style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:12,padding:"14px 16px"}}>
                      <div style={{fontSize:10,letterSpacing:"0.15em",color:"#444",textTransform:"uppercase",marginBottom:6}}>{l}</div>
                      <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"20px"}}>
                  {dayTxs.length===0 && <div style={{color:"#333"}}>No charges this day.</div>}
                  {dayTxs.map(t=>(
                    <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid #1a1a22"}}>
                      <div>
                        <div style={{fontSize:14,color:"#ddd",display:"flex",alignItems:"center",gap:8}}>
                          <span style={{width:8,height:8,borderRadius:2,background:CAT_COLORS[t.category]||"#888",display:"inline-block"}}/>
                          {t.desc}
                        </div>
                        <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginTop:2}}>{t.category}</div>
                      </div>
                      <div style={{fontSize:15,fontWeight:700,fontFamily:"monospace",color:"#e8845a"}}>{fmt(t.amount)}</div>
                    </div>
                  ))}
                </div>
              </>
            ) : (
              <div style={{background:"#111116",border:"1px solid #1e1e28",borderRadius:14,padding:"40px",textAlign:"center",color:"#333"}}>Click any day on the calendar to view charges.</div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
